<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кожаный чехол на iPhone 17 Pro</title>

    <!-- OG теги для красивого превью в Instagram -->
    <meta property="og:title" content="Кожаный чехол на iPhone 17 Pro">
    <meta property="og:description" content="Смотреть объявление на Avito">
    <meta property="og:type" content="website">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #ddd;
            border-top-color: #00aaff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #555; font-size: 16px; margin-bottom: 16px; }
        a {
            display: inline-block;
            padding: 14px 32px;
            background: #00aaff;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Открываем ссылку...</p>
        <a id="fallback-link" href="#" style="display:none;">Открыть вручную</a>
    </div>

    <script>
        (function() {
            var TARGET = 'https://www.avito.ru/moskva/telefony/kozhanyy_chehol_na_iphone_17_pro_8051366389?utm_campaign=native&utm_medium=item_page_ios&utm_source=soc_sharing_seller&utm_content=link_in_bio&fbclid=PAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGnQPQALXXLWl3Bd2Ya_mzrvHxs68jRgH-svENE43zn0FlvE-bd_6IShLkhM3U_aem_7v-YtZCIiGnbjc774_3Tng';

            var ua = navigator.userAgent || '';
            var isInstagramBrowser = /Instagram/i.test(ua);
            var isAndroid = /Android/i.test(ua);
            var isIOS = /iPhone|iPad|iPod/i.test(ua);

            function showFallback() {
                var link = document.getElementById('fallback-link');
                link.href = TARGET;
                link.style.display = 'inline-block';
            }

            // Если не Instagram браузер — просто редиректим
            if (!isInstagramBrowser) {
                window.location.href = TARGET;
                return;
            }

            // --- Instagram In-App Browser ---

            if (isAndroid) {
                // Android: intent:// схема открывает Chrome/системный браузер
                var intentUrl = 'intent://' + TARGET.replace(/^https?:\/\//, '') +
                    '#Intent;scheme=https;package=com.android.chrome;end';
                window.location.href = intentUrl;

                // Фоллбэк если intent не сработал
                setTimeout(showFallback, 2000);

            } else if (isIOS) {
                // iOS: Используем несколько методов

                // Метод 1: window.open с _system (иногда работает)
                // Метод 2: Создаём ссылку с target=_blank
                // Метод 3: Google redirect (надёжный способ выбросить из in-app браузера)

                // Самый надёжный способ для iOS Instagram — через Google redirect
                var googleRedirect = 'googlechrome://' + TARGET.replace(/^https?:\/\//, '');

                // Пробуем открыть через Chrome scheme
                window.location.href = googleRedirect;

                // Если Chrome не установлен, через 500мс пробуем Safari
                setTimeout(function() {
                    // x-safari-https:// scheme
                    window.location.href = 'x-safari-https://' + TARGET.replace(/^https?:\/\//, '');
                }, 500);

                // Если ничего не сработало — фоллбэк через обычный редирект
                setTimeout(function() {
                    window.location.href = TARGET;
                    showFallback();
                }, 1500);

            } else {
                // Десктоп или неизвестное устройство
                window.location.href = TARGET;
            }
        })();
    </script>
</body>
</html>
